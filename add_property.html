<!DOCTYPE html>
<html>
<head>
    <title>Add Property</title>
</head>
<body>

<h1>Add Property</h1>

<form method="POST">

    <input type="text"
           name="title"
           placeholder="Title"
           required>

    <br><br>

    <input type="text"
           name="location"
           placeholder="Location"
           required>

    <br><br>

    <input type="number"
           name="price"
           placeholder="Price"
           required>

    <br><br>

    <input type="number"
           name="bedrooms"
           placeholder="Bedrooms"
           required>

    <br><br>

    <input type="text"
           name="property_type"
           placeholder="Property Type"
           required>

    <br><br>

    <textarea
        name="description"
        placeholder="Description">
    </textarea>

    <br><br>

    <button type="submit">
        Add Property
    </button>

</form>

</body>
</html>
